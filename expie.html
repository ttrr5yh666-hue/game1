<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAV: Прототип Expie</title>
    <style>
        body { background: #0b0c10; color: #c5c6c7; font-family: monospace; padding: 20px; text-align: center; }
        .back-btn { display: inline-block; background: #1f2833; color: #66fcf1; padding: 10px 20px; text-decoration: none; border: 1px solid #45f3ff; border-radius: 4px; margin-bottom: 20px; }
        .game-container { display: flex; justify-content: center; gap: 30px; margin-top: 20px; flex-wrap: wrap; }
        .character-viewport { position: relative; width: 320px; height: 480px; background: #1f2833; border: 2px solid #45f3ff; border-radius: 8px; overflow: hidden; }
        .character-status { border: 2px solid #1f2833; padding: 20px; background: #141a22; width: 300px; text-align: left; border-radius: 8px; }
        .controls { display: flex; flex-direction: column; gap: 10px; width: 250px; }
        button { background: #1f2833; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button.heal { color: #2ecc71; border: 1px solid #2ecc71; }
        .status-ok { color: #2ecc71; } .status-warn { color: #f1c40f; } .status-crit { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">⬅ НА ГЛАВНУЮ</a>
    <h1>СИСТЕМА ЖИЗНЕОБЕСПЕЧЕНИЯ ЭКСПЕРИМЕНТА</h1>
    <h2 id="global-status" class="status-ok">ПОДОПЫТНЫЙ СТАБИЛЕН</h2>
    
    <div class="game-container">
        <div class="character-viewport">
            <img id="img-tail" src="experimentTail.png" alt="Tail" style="position:absolute !important;transform:none !important;top:180px !important;left:20px !important;width:160px !important;height:160px !important;z-index:1 !important;object-fit:contain !important;image-rendering:pixelated !important;">
            <img id="img-thigh" src="experimentThigh.png" alt="Thigh" style="position:absolute !important;transform:none !important;top:260px !important;left:110px !important;width:105px !important;height:95px !important;z-index:3 !important;object-fit:contain !important;image-rendering:pixelated !important;">
            <img id="img-crus" src="experimentCrus.png" alt="Crus" style="position:absolute !important;transform:none !important;top:310px !important;left:95px !important;width:110px !important;height:100px !important;z-index:2 !important;object-fit:contain !important;image-rendering:pixelated !important;">
            <img id="img-foot" src="experimentFoot.png" alt="Foot" style="position:absolute !important;transform:none !important;top:375px !important;left:115px !important;width:100px !important;height:75px !important;z-index:3 !important;object-fit:contain !important;image-rendering:pixelated !important;">
            <img id="img-downtorso" src="experimentDownTorso.png" alt="DownTorso" style="position:absolute !important;transform:none !important;top:215px !important;left:115px !important;width:105px !important;height:95px !important;z-index:4 !important;object-fit:contain !important;image-rendering:pixelated !important;">
            <img id="img-uptorso" src="experimentUpTorso.png" alt="UpTorso" style="position:absolute !important;transform:none !important;top:145px !important;left:110px !important;width:115px !important;height:115px !important;z-index:5 !important;object-fit:contain !important;image-rendering:pixelated !important;">
            <img id="img-uparm" src="experimentUpArm.png" alt="UpArm" style="position:absolute !important;transform:none !important;top:165px !important;left:115px !important;width:110px !important;height:85px !important;z-index:4 !important;object-fit:contain !important;image-rendering:pixelated !important;">
            <img id="img-downarm" src="experimentDownArm.png" alt="DownArm" style="position:absolute !important;transform:none !important;top:200px !important;left:125px !important;width:105px !important;height:80px !important;z-index:6 !important;object-fit:contain !important;image-rendering:pixelated !important;">
            <img id="img-handb" src="experimentHandB.png" alt="HandB" style="position:absolute !important;transform:none !important;top:240px !important;left:100px !important;width:55px !important;height:55px !important;z-index:3 !important;object-fit:contain !important;image-rendering:pixelated !important;">
            <img id="img-handf" src="experimentHandF.png" alt="HandF" style="position:absolute !important;transform:none !important;top:235px !important;left:160px !important;width:55px !important;height:55px !important;z-index:7 !important;object-fit:contain !important;image-rendering:pixelated !important;">
            
            <!-- ГОЛОВА -->
            <img id="img-head" src="experimentHead.png" alt="Head" style="position:absolute !important;transform:none !important;top:15px !important;left:88px !important;width:175px !important;height:175px !important;z-index:10 !important;object-fit:contain !important;image-rendering:pixelated !important;">
            
            <!-- ИСПРАВЛЕНИЕ: Глаз увеличен в 3 раза, сдвинут влево и опущен на 1 пиксель вниз -->
            <img id="img-eye" src="experimentEyeOpen.png" alt="Eye" style="position:absolute !important;transform:none !important;top:44px !important;left:133px !important;width:225px !important;height:225px !important;z-index:11 !important;object-fit:contain !important;image-rendering:pixelated !important;">
        </div>

        <div class="character-status">
            <h3>Мониторинг систем:</h3>
            <p>Голова: <span id="hp-head">100</span>/100</p>
            <p>Верхний Торс: <span id="hp-uptorso">120</span>/120</p>
            <p>Нижний Торс: <span id="hp-downtorso">100</span>/100</p>
            <p>Голень: <span id="hp-crus">60</span>/60 <span id="lbl-crus"></span></p>
            <p>Хвост: <span id="hp-tail">40</span>/40</p>
            <hr>
            <p>Кровотечение: <span id="bleed-status">НЕТ</span></p>
            <p>Состояние Чипа: <span id="sanity-status">СТАБИЛЬНО</span></p>
        </div>

        <div class="controls">
            <h3>Симуляция атак:</h3>
            <button onclick="dealDamage('head',35)">Удар в лицо (-35 HP)</button>
            <button onclick="dealDamage('head',40)">Укус в голову (-40 HP)</button>
            <button onclick="dealDamage('crus',45)">Удар в голень (-45 HP)</button>
            <button onclick="dealDamage('tail',40)">Откусить хвост (-40 HP)</button>
            <hr>
            <button class="heal" onclick="heal('head',100)">Хирургический Набор</button>
            <button class="heal" onclick="heal('crus',60)">Медицинская шина</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
