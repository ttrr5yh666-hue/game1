<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAV: CASUALTIES UNKNOWN СБОРКА</title>
    <style>
        body {
            background-color: #080a0c;
            color: #d1d7de;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        .game-container {
            width: 560px;
            background-color: #12161c;
            border: 2px solid #3a4454;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            position: relative;
        }
        h1 { text-align: center; color: #ff3366; font-size: 18px; margin-top: 0; letter-spacing: 3px; }
        
        .back-to-menu {
            position: absolute;
            top: 15px;
            left: 20px;
            background: #181d26;
            color: #8b949e;
            border: 1px solid #222933;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
        }
        .back-to-menu:hover { border-color: #ff3366; color: #fff; }

        #gameCanvas {
            background-color: #040507;
            border: 2px solid #222933;
            display: block;
            margin: 0 auto 15px auto;
            border-radius: 4px;
        }

        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; background: #181d26; padding: 10px; border-radius: 4px; border: 1px solid #222933; font-size: 14px; }
        .log { height: 75px; background-color: #090b0e; border: 1px solid #222933; padding: 10px; overflow-y: auto; font-size: 13px; margin-bottom: 15px; border-radius: 4px; color: #8b949e; }
    </style>
</head>
<body>

<div class="game-container">
    <a href="index.html" class="back-to-menu">← НА ГЛАВНУЮ</a>
    <h1>SCAV: CASUALTIES UNKNOWN</h1>
    
    <canvas id="gameCanvas" width="500" height="240"></canvas>

    <div class="stats">
        <div>Точная калибровка: <span style="color: #ff3366;">Ровный Expie</span></div>
        <div>Ходьба: <b>← → (Стрелочки)</b></div>
    </div>
    
    <div id="log" class="log">> Подгонка координат суставов...</div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const logEl = document.getElementById('log');
    function log(text) {
        logEl.innerHTML += `<br>${text}`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    // Подключаем все текстуры
    const sprites = {
        head: new Image(),
        eyeOpen: new Image(),
        upTorso: new Image(),
        downTorso: new Image(),
        tail: new Image(),
        thigh: new Image(),
        crus: new Image(),
        foot: new Image(),
        upArm: new Image(),
        downArm: new Image(),
        handB: new Image(),
        handF: new Image()
    };

    sprites.head.src = "experimentHead.png";
    sprites.eyeOpen.src = "experimentEyeOpen.png";
    sprites.upTorso.src = "experimentUpTorso.png";
    sprites.downTorso.src = "experimentDownTorso.png";
    sprites.tail.src = "experimentTail.png";
    sprites.thigh.src = "experimentThigh.png";
    sprites.crus.src = "experimentCrus.png";
    sprites.foot.src = "experimentFoot.png";
    sprites.upArm.src = "experimentUpArm.png";
    sprites.downArm.src = "experimentDownArm.png";
    sprites.handB.src = "experimentHandB.png";
    sprites.handF.src = "experimentHandF.png";

    let loadedCount = 0;
    const totalSprites = Object.keys(sprites).length;

    for (let key in sprites) {
        sprites[key].onload = () => {
            loadedCount++;
            if (loadedCount === totalSprites) {
                log("✅ Коррекция завершена! Все части тела соединены ровно.");
            }
        };
    }

    let player = {
        x: 220,
        y: 60, // Сместили базу повыше для удобства расчетов
        speed: 3,
        direction: "right"
    };

    let keys = {};
    window.addEventListener("keydown", (e) => { keys[e.key] = true; });
    window.addEventListener("keyup", (e) => { keys[e.key] = false; });

    let animTime = 0;

    function drawAssembledExpie(x, y) {
        let legSwing = Math.sin(animTime * 0.15) * 8;
        let armSwing = Math.cos(animTime * 0.15) * 6;

        if (!keys["ArrowRight"] && !keys["ArrowLeft"]) {
            legSwing = 0; armSwing = 0;
        }

        ctx.save();
        if (player.direction === "left") {
            ctx.translate(x + 25, y);
            ctx.scale(-1, 1);
            ctx.translate(-x - 25, -y);
        }

        // 1. ХВОСТ (Теперь прижат вплотную к тазу сзади)
        if (sprites.tail.complete) {
            ctx.drawImage(sprites.tail, x - 12, y + 42 + Math.sin(animTime * 0.1) * 2, 24, 24);
        }

        // 2. ЗАДНЯЯ РУКА (Корректные координаты слоев)
        if (sprites.upArm.complete && sprites.handB.complete) {
            ctx.drawImage(sprites.upArm, x - 2 - armSwing * 0.2, y + 25, 14, 14);
            ctx.drawImage(sprites.handB, x - 4 - armSwing * 0.4, y + 36, 10, 10);
        }

        // 3. ЗАДНЯЯ НОГА
        if (sprites.thigh.complete && sprites.crus.complete && sprites.foot.complete) {
            let backLegOffset = legSwing;
            ctx.drawImage(sprites.thigh, x + 2 + backLegOffset * 0.2, y + 50, 14, 14);
            ctx.drawImage(sprites.crus, x + 2 + backLegOffset * 0.4, y + 62, 12, 14);
            ctx.drawImage(sprites.foot, x + backLegOffset, y + 74, 14, 8);
        }

        // 4. ТАЗ (DownTorso — основа нижней части)
        if (sprites.downTorso.complete) {
            ctx.drawImage(sprites.downTorso, x + 2, y + 38, 26, 16);
        }

        // 5. ГРУДЬ (UpTorso — ставится ровно поверх таза)
        if (sprites.upTorso.complete) {
            ctx.drawImage(sprites.upTorso, x, y + 20, 28, 20);
        }

        // 6. ГОЛОВА (Опустили ниже, убрав пустой зазор в шее)
        if (sprites.head.complete) {
            ctx.drawImage(sprites.head, x + 2, y + 4, 24, 18);
        }

        // 7. СВЕТЯЩИЙСЯ РОЗОВЫЙ ГЛАЗ (Точно в центр визора головы)
        if (sprites.eyeOpen.complete) {
            ctx.shadowBlur = 10; ctx.shadowColor = "#ff3399";
            ctx.drawImage(sprites.eyeOpen, x + 14, y + 10, 6, 6);
            ctx.shadowBlur = 0;
        }

        // 8. ПЕРЕДНЯЯ НОГА
        if (sprites.thigh.complete && sprites.crus.complete && sprites.foot.complete) {
            let frontLegOffset = -legSwing;
            ctx.drawImage(sprites.thigh, x + 10 + frontLegOffset * 0.2, y + 50, 14, 14);
            ctx.drawImage(sprites.crus, x + 10 + frontLegOffset * 0.4, y + 62, 12, 14);
            ctx.drawImage(sprites.foot, x + 8 + frontLegOffset, y + 74, 14, 8);
        }

        // 9. ПЕРЕДНЯЯ РУКА (DownArm + HandF — поверх груди)
        if (sprites.downArm.complete && sprites.handF.complete) {
            ctx.drawImage(sprites.downArm, x + 14 + armSwing * 0.2, y + 25, 14, 14);
            ctx.drawImage(sprites.handF, x + 14 + armSwing * 0.4, y + 36, 10, 10);
        }

        ctx.restore();
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#0a0d12";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Подняли уровень пола под новые ровные ноги
        ctx.fillStyle = "#2c3540";
        ctx.fillRect(0, 140, canvas.width, 100);

        if (keys["ArrowRight"] && player.x < canvas.width - 40) {
            player.x += player.speed;
            player.direction = "right";
            animTime++;
        }
        if (keys["ArrowLeft"] && player.x > 20) {
            player.x -= player.speed;
            player.direction = "left";
            animTime++;
        }

        drawAssembledExpie(player.x, player.y);

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
