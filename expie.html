<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAV: CASUALTIES UNKNOWN БАЗА</title>
    <style>
        body {
            background-color: #080a0c;
            color: #d1d7de;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        .game-container {
            width: 560px;
            background-color: #12161c;
            border: 2px solid #3a4454;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            position: relative;
        }
        h1 { text-align: center; color: #ff3366; font-size: 18px; margin-top: 0; letter-spacing: 3px; }
        
        .back-to-menu {
            position: absolute;
            top: 15px;
            left: 20px;
            background: #181d26;
            color: #8b949e;
            border: 1px solid #222933;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
        }
        .back-to-menu:hover { border-color: #ff3366; color: #fff; }

        #gameCanvas {
            background-color: #040507;
            border: 2px solid #222933;
            display: block;
            margin: 0 auto 15px auto;
            border-radius: 4px;
        }

        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; background: #181d26; padding: 10px; border-radius: 4px; border: 1px solid #222933; font-size: 14px; }
        .log { height: 75px; background-color: #090b0e; border: 1px solid #222933; padding: 10px; overflow-y: auto; font-size: 13px; margin-bottom: 15px; border-radius: 4px; color: #8b949e; }
    </style>
</head>
<body>

<div class="game-container">
    <a href="index.html" class="back-to-menu">← НА ГЛАВНУЮ</a>
    <h1>SCAV: CASUALTIES UNKNOWN</h1>
    
    <canvas id="gameCanvas" width="500" height="240"></canvas>

    <div class="stats">
        <div>Тест Шага 1: <span style="color: #ff3366;">Сборка Expie</span></div>
        <div>Управление: <b>← → (Стрелочки)</b></div>
    </div>
    
    <div id="log" class="log">> Инициализация конструктора персонажа...</div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const logEl = document.getElementById('log');
    function log(text) {
        logEl.innerHTML += `<br>${text}`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    // Загрузка твоих картинок
    const sprites = {
        head: new Image(),
        upTorso: new Image(),
        downTorso: new Image(),
        tail: new Image(),
        thigh: new Image(),
        crus: new Image(),
        foot: new Image()
    };

    sprites.head.src = "experimentHead.png";
    sprites.upTorso.src = "experimentUpTorso.png";
    sprites.downTorso.src = "experimentDownTorso.png";
    sprites.tail.src = "experimentTail.png";
    sprites.thigh.src = "experimentThigh.png";
    sprites.crus.src = "experimentCrus.png";
    sprites.foot.src = "experimentFoot.png";

    let loadedCount = 0;
    const totalSprites = Object.keys(sprites).length;

    for (let key in sprites) {
        sprites[key].onload = () => {
            loadedCount++;
            if (loadedCount === totalSprites) {
                log("✅ Все оригинальные спрайты Expie успешно загружены!");
            }
        };
        sprites[key].onerror = () => {
            log(`❌ Проблема с файлом: ${sprites[key].src.split('/').pop()}`);
        };
    }

    let player = {
        x: 150,
        y: 80,
        speed: 3
    };

    let keys = {};
    window.addEventListener("keydown", (e) => { keys[e.key] = true; });
    window.addEventListener("keyup", (e) => { keys[e.key] = false; });

    let animTime = 0;

    function drawAssembledExpie(x, y) {
        let legSwing = Math.sin(animTime * 0.15) * 10;
        if (!keys["ArrowRight"] && !keys["ArrowLeft"]) {
            legSwing = 0;
        }

        // Хвост
        if (sprites.tail.complete && sprites.tail.naturalWidth !== 0) {
            ctx.drawImage(sprites.tail, x - 20, y + 25 + Math.sin(animTime * 0.1) * 3, 25, 25);
        }

        // Задняя нога
        if (sprites.thigh.complete && sprites.crus.complete && sprites.foot.complete) {
            let backLegOffset = legSwing;
            ctx.drawImage(sprites.thigh, x + 2 + backLegOffset * 0.3, y + 38, 10, 12);
            ctx.drawImage(sprites.crus, x + 2 + backLegOffset * 0.6, y + 48, 8, 12);
            ctx.drawImage(sprites.foot, x + backLegOffset, y + 58, 12, 6);
        }

        // Таз
        if (sprites.downTorso.complete && sprites.downTorso.naturalWidth !== 0) {
            ctx.drawImage(sprites.downTorso, x + 2, y + 30, 20, 12);
        }

        // Грудь
        if (sprites.upTorso.complete && sprites.upTorso.naturalWidth !== 0) {
            ctx.drawImage(sprites.upTorso, x, y + 14, 24, 18);
        }

        // Башка
        if (sprites.head.complete && sprites.head.naturalWidth !== 0) {
            ctx.drawImage(sprites.head, x + 4, y, 20, 14);
        }

        // Передняя нога
        if (sprites.thigh.complete && sprites.crus.complete && sprites.foot.complete) {
            let frontLegOffset = -legSwing;
            ctx.drawImage(sprites.thigh, x + 10 + frontLegOffset * 0.3, y + 38, 10, 12);
            ctx.drawImage(sprites.crus, x + 10 + frontLegOffset * 0.6, y + 48, 8, 12);
            ctx.drawImage(sprites.foot, x + 8 + frontLegOffset, y + 58, 12, 6);
        }
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#0a0d12";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#2c3540";
        ctx.fillRect(0, 145, canvas.width, 95);

        if (keys["ArrowRight"] && player.x < canvas.width - 40) {
            player.x += player.speed;
            animTime++;
        }
        if (keys["ArrowLeft"] && player.x > 20) {
            player.x -= player.speed;
            animTime++;
        }

        drawAssembledExpie(player.x, player.y);

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
