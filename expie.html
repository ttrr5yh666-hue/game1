<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAV: CASUALTIES UNKNOWN (RAGDOLL TRIGGER)</title>
    <style>
        body {
            background-color: #080a0c;
            color: #d1d7de;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        .game-container {
            width: 560px;
            background-color: #12161c;
            border: 2px solid #3a4454;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            position: relative;
        }
        h1 { text-align: center; color: #ff3366; font-size: 18px; margin-top: 0; letter-spacing: 3px; }
        
        .back-to-menu {
            position: absolute;
            top: 15px;
            left: 20px;
            background: #181d26;
            color: #8b949e;
            border: 1px solid #222933;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
        }
        .back-to-menu:hover { border-color: #ff3366; color: #fff; }

        #gameCanvas {
            background-color: #040507;
            border: 2px solid #222933;
            display: block;
            margin: 0 auto 15px auto;
            border-radius: 4px;
        }

        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; background: #181d26; padding: 10px; border-radius: 4px; border: 1px solid #222933; font-size: 14px; }
        .log { height: 75px; background-color: #090b0e; border: 1px solid #222933; padding: 10px; overflow-y: auto; font-size: 13px; margin-bottom: 15px; border-radius: 4px; color: #8b949e; }
    </style>
</head>
<body>

<div class="game-container">
    <a href="index.html" class="back-to-menu">← НА ГЛАВНУЮ</a>
    <h1>SCAV: CASUALTIES UNKNOWN</h1>
    
    <canvas id="gameCanvas" width="500" height="240"></canvas>

    <div class="stats">
        <div>Режим скафандра: <span id="mode-text" style="color: #00ff00; font-weight: bold;">ХОДЬБА</span></div>
        <div>Кнопка <b>[ X ]</b>: Упасть / Встать</div>
    </div>
    
    <div id="log" class="log">> Система стабилизации перезапущена. Нажмите [ X ] для проверки физики падения!</div>
</div>
<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const logEl = document.getElementById('log');
    function log(text) {
        logEl.innerHTML += `<br>${text}`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    // Загрузка спрайтов
    const sprites = {
        head: new Image(), eyeOpen: new Image(), upTorso: new Image(),
        downTorso: new Image(), tail: new Image(), thigh: new Image(),
        crus: new Image(), foot: new Image(), upArm: new Image(),
        downArm: new Image(), handB: new Image(), handF: new Image()
    };

    sprites.head.src = "experimentHead.png";
    sprites.eyeOpen.src = "experimentEyeOpen.png";
    sprites.upTorso.src = "experimentUpTorso.png";
    sprites.downTorso.src = "experimentDownTorso.png";
    sprites.tail.src = "experimentTail.png";
    sprites.thigh.src = "experimentThigh.png";
    sprites.crus.src = "experimentCrus.png";
    sprites.foot.src = "experimentFoot.png";
    sprites.upArm.src = "experimentUpArm.png";
    sprites.downArm.src = "experimentDownArm.png";
    sprites.handB.src = "experimentHandB.png";
    sprites.handF.src = "experimentHandF.png";

    let player = {
        x: 220,
        y: 60,
        speed: 3,
        direction: "right",
        isRagdoll: false
    };

    // Смещения и углы поворота для каждой кости в режиме рэгдолла
    let ragdollOffsets = {
        head: { dx: 10, dy: -24, angle: 0, va: 0, vy: 0 },
        tail: { dx: 2, dy: 12, angle: 0, va: 0, vy: 0 },
        upArm: { dx: 14, dy: -4, angle: 0, va: 0, vy: 0 },
        downArm: { dx: 18, dy: -4, angle: 0, va: 0, vy: 0 },
        thighBack: { dx: 4, dy: 10, angle: 0, va: 0, vy: 0 },
        thighFront: { dx: 8, dy: 10, angle: 0, va: 0, vy: 0 }
    };

    let keys = {};
    window.addEventListener("keydown", (e) => { 
        keys[e.key] = true; 
        
        if (e.key.toLowerCase() === "x" || e.key.toLowerCase() === "ч") {
            player.isRagdoll = !player.isRagdoll;
            
            if (player.isRagdoll) {
                document.getElementById("mode-text").innerText = "РЭГДОЛЛ";
                document.getElementById("mode-text").style.color = "#ff3366";
                log("⚠️ Мышцы скафандра Expie полностью отключены! Тряска суставов.");
                
                // Задаем случайный начальный толчок деталям при падении
                for (let key in ragdollOffsets) {
                    ragdollOffsets[key].va = (Math.random() - 0.5) * 0.2;
                    ragdollOffsets[key].vy = Math.random() * 2;
                }
            } else {
                document.getElementById("mode-text").innerText = "ХОДЬБА";
                document.getElementById("mode-text").style.color = "#00ff00";
                log("✅ Системы запущены! Персонаж восстановил форму.");
                
                // Сбрасываем физику
                for (let key in ragdollOffsets) {
                    ragdollOffsets[key].angle = 0;
                    ragdollOffsets[key].va = 0;
                    ragdollOffsets[key].vy = 0;
                }
            }
        }
    });
    window.addEventListener("keyup", (e) => { keys[e.key] = false; });

    let animTime = 0;

    function drawPart(img, x, y, angle, scaleX = 1, pivotX = 0, pivotY = 0) {
        if (!img.complete || img.naturalWidth === 0) return;
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scaleX, 1);
        ctx.rotate(angle);
        ctx.drawImage(img, -pivotX, -pivotY);
        ctx.restore();
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0a0d12"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#2c3540"; ctx.fillRect(0, 168, canvas.width, 72);

        let legSwing = Math.sin(animTime * 0.15) * 6;
        let armSwing = Math.cos(animTime * 0.15) * 4;

        if (!player.isRagdoll) {
            // ДВИЖЕНИЕ В РЕЖИМЕ ХОДЬБЫ
            if (keys["ArrowRight"] && player.x < canvas.width - 50) {
                player.x += player.speed; player.direction = "right"; animTime++;
            }
            if (keys["ArrowLeft"] && player.x > 10) {
                player.x -= player.speed; player.direction = "left"; animTime++;
            }
        } else {
            // СИМУЛЯЦИЯ ФИЗИКИ ПАДЕНИЯ (РЭГДОЛЛ)
            for (let key in ragdollOffsets) {
                let o = ragdollOffsets[key];
                o.angle += o.va;
                o.dy += o.vy;
                o.vy += 0.35; // Гравитация деталей

                // Пол на уровне 160px для суставов
                let currentFloorY = 160 - (player.y + 42);
                if (o.dy > currentFloorY) {
                    o.dy = currentFloorY;
                    o.vy = -o.vy * 0.2; // Амортизация удара
                    o.va *= 0.5; // Трение об пол
                }
            }
        }

        // ОТРИСОВКА ПАЗЛА
        let sitY = player.y + 42;
        let flip = player.direction === "left" ? -1 : 1;

        // 1. Хвост
        let tailA = player.isRagdoll ? ragdollOffsets.tail.angle : Math.sin(animTime * 0.1) * 0.1;
        let tailY = player.isRagdoll ? sitY + ragdollOffsets.tail.dy : sitY + 12;
        drawPart(sprites.tail, player.x + (2 * flip), tailY, tailA, flip, 0, 0);

        // 2. Задняя рука
        let armBA = player.isRagdoll ? ragdollOffsets.upArm.angle : -armSwing * 0.05;
        let armBY = player.isRagdoll ? sitY + ragdollOffsets.upArm.dy : sitY - 4;
        if (sprites.upArm.complete) {
            drawPart(sprites.upArm, player.x + (14 * flip), armBY, armBA, flip, 0, 0);
            drawPart(sprites.handB, player.x + ((14 - legSwing) * flip), armBY + 12, armBA * 1.2, flip, 0, 0);
        }

        // 3. Задняя нога
        let legBA = player.isRagdoll ? ragdollOffsets.thighBack.angle : legSwing * 0.05;
        let legBY = player.isRagdoll ? sitY + ragdollOffsets.thighBack.dy : sitY + 10;
        if (sprites.thigh.complete) {
            drawPart(sprites.thigh, player.x + (4 * flip), legBY, legBA, flip, 0, 0);
            drawPart(sprites.crus, player.x + ((4 + legSwing * 0.2) * flip), legBY + 12, legBA, flip, 0, 0);
            drawPart(sprites.foot, player.x + ((4 + legSwing) * flip), legBY + 24, legBA, flip, 0, 0);
        }

        // 4. Таз (Основа тела)
        let torsoY = sitY + (player.isRagdoll ? ragdollOffsets.tail.dy * 0.5 : 6);
        drawPart(sprites.downTorso, player.x + (4 * flip), torsoY, 0, flip, 0, 0);

        // 5. Грудь
        let chestY = sitY + (player.isRagdoll ? ragdollOffsets.upArm.dy * 0.5 : -6);
        drawPart(sprites.upTorso, player.x + (8 * flip), chestY, 0, flip, 0, 0);

        // Шея
        ctx.fillStyle = "#1e222a";
        ctx.fillRect(player.x + (18 * flip), chestY - 4, 4 * flip, 3);

        // 6. Голова
        let headA = player.isRagdoll ? ragdollOffsets.head.angle : 0;
        let headY = player.isRagdoll ? sitY + ragdollOffsets.head.dy : sitY - 24;
        drawPart(sprites.head, player.x + (10 * flip), headY, headA, flip, 0, 0);

        // Глаз визора
        if (sprites.eyeOpen.complete) {
            ctx.save();
            ctx.shadowBlur = 10; ctx.shadowColor = "#ff3399";
            ctx.fillStyle = "#ffb3d1";
            ctx.fillRect(player.x + (20 * flip) + (player.isRagdoll ? Math.cos(headA)*2 : 0), headY + 6, 5 * flip, 5);
            ctx.restore();
        }

        // 7. Передняя нога
        let legFA = player.isRagdoll ? ragdollOffsets.thighFront.angle : -legSwing * 0.05;
        let legFY = player.isRagdoll ? sitY + ragdollOffsets.thighFront.dy : sitY + 10;
        if (sprites.thigh.complete) {
            drawPart(sprites.thigh, player.x + (8 * flip), legFY, legFA, flip, 0, 0);
            drawPart(sprites.crus, player.x + ((8 - legSwing * 0.2) * flip), legFY + 12, legFA, flip, 0, 0);
            drawPart(sprites.foot, player.x + ((8 - legSwing) * flip), legFY + 24, legFA, flip, 0, 0);
        }

        // 8. Передняя рука
        let armFA = player.isRagdoll ? ragdollOffsets.downArm.angle : armSwing * 0.05;
        let armFY = player.isRagdoll ? sitY + ragdollOffsets.downArm.dy : sitY - 4;
        if (sprites.downArm.complete) {
            drawPart(sprites.downArm, player.x + (18 * flip), armFY, armFA, flip, 0, 0);
            drawPart(sprites.handF, player.x + ((18 + armSwing) * flip), armFY + 12, armFA * 1.2, flip, 0, 0);
        }

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
