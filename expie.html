<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAV: CASUALTIES UNKNOWN 2D</title>
    <style>
        body {
            background-color: #080a0c;
            color: #d1d7de;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        .game-container {
            width: 560px;
            background-color: #12161c;
            border: 2px solid #3a4454;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
        }
        h1 { text-align: center; color: #ff3366; font-size: 18px; margin-top: 0; letter-spacing: 3px; }
        
        #gameCanvas {
            background-color: #040507;
            border: 2px solid #222933;
            display: block;
            margin: 0 auto 15px auto;
            border-radius: 4px;
        }

        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; background: #181d26; padding: 10px; border-radius: 4px; border: 1px solid #222933; font-size: 14px; }
        .warning { color: #ff3333; font-weight: bold; text-align: center; margin: 5px 0; display: none; font-size: 13px; }
        .log { height: 75px; background-color: #090b0e; border: 1px solid #222933; padding: 10px; overflow-y: auto; font-size: 13px; margin-bottom: 15px; border-radius: 4px; color: #8b949e; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background-color: #181d26; color: #c9d1d9; border: 1px solid #222933; padding: 10px; cursor: pointer; border-radius: 4px; font-family: inherit; transition: 0.1s; font-weight: bold; }
        button:hover { background-color: #222933; border-color: #ff3366; color: #fff; }
        button:disabled { opacity: 0.2; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>SCAV: CASUALTIES UNKNOWN (2D)</h1>
    
    <canvas id="gameCanvas" width="500" height="200"></canvas>

    <div class="stats">
        <div>Метры: <span id="progress">0</span> / 2000м</div>
        <div>Корпус: <span id="hp">100</span>%</div>
        <div>Мины: <span id="mines">2</span>💥</div>
    </div>

    <div class="stats" style="font-size: 12px; color: #8b949e;">
        <div>Титан: <span id="titan">0</span></div>
        <div>Порох: <span id="gunpowder">1</span></div>
        <div>Ходьба: <b>← → (Стрелочки)</b></div>
    </div>

    <div id="bleed-warn" class="warning">⚠️ УТЕЧКА МАСЛА! Движение медленно отнимает HP!</div>
    
    <div id="log" class="log">Система Expie запущена. Карта ограничена (2000м). Идите направо.</div>

    <div class="actions">
        <button onclick="rechargeBattery()">Сварка (1 тит.)</button>
        <button onclick="craftMine()">Скрафтить мину (1 пор. + 1 тит.)</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let hp = 100;
    let depth = 0;
    const maxDepth = 2000; 
    let leak = false;
    let gameOver = false;
    let inventory = { titan: 0, gunpowder: 1, mines: 2 };

    let player = {
        x: 50,
        y: 95,
        width: 25,
        height: 55,
        speed: 4
    };

    let gameObjects = [
        { x: 300, type: "titan", icon: "💎", active: true },
        { x: 550, type: "glass", icon: "💠", active: true },
        { x: 800, type: "trap", icon: "💥", active: true },
        { x: 1100, type: "enemy", icon: "👾", active: true },
        { x: 1350, type: "titan", icon: "💎", active: true },
        { x: 1550, type: "trap", icon: "💥", active: true },
        { x: 1750, type: "enemy", icon: "👾", active: true },
        { x: maxDepth, type: "exit", icon: "🚪", active: true } 
    ];

    const logEl = document.getElementById('log');
    function log(text) {
        logEl.innerHTML += `<br>${text}`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    let keys = {};
    window.addEventListener("keydown", (e) => { keys[e.key] = true; });
    window.addEventListener("keyup", (e) => { keys[e.key] = false; });

    function updateUI() {
        document.getElementById('hp').innerText = hp;
        document.getElementById('progress').innerText = Math.min(maxDepth, Math.floor(depth));
        document.getElementById('mines').innerText = inventory.mines;
        document.getElementById('titan').innerText = inventory.titan;
        document.getElementById('gunpowder').innerText = inventory.gunpowder;
        document.getElementById('bleed-warn').style.display = leak ? 'block' : 'none';

        if (hp <= 0 && !gameOver) {
            gameOver = true;
            log("<b style='color:#ff3333;'>💀 КРИТИЧЕСКИЙ СБОЙ: Корпус Expie полностью разрушен.</b>");
        }
    }

    function checkCollisions() {
        gameObjects.forEach(obj => {
            if (obj.active && Math.abs(player.x - obj.x) < 25) {
                if (obj.type === "exit") {
                    gameOver = true;
                    log("<b style='color:#00ff00;'>🎉 МИССИЯ ВЫПОЛНЕНА! Expie успешно эвакуировался через лифт!</b>");
                    return;
                }

                obj.active = false;
                if (obj.type === "titan") {
                    inventory.titan++;
                    log("💎 Найден Титан.");
                } else if (obj.type === "glass") {
                    hp -= 15;
                    log("💠 Хруст! Осколки стекла повредили гидравлику ног (-15 HP).");
                } else if (obj.type === "trap") {
                    if (inventory.mines > 0) {
                        inventory.mines--;
                        log("💥 Сработал датчик: Мина-ловушка уничтожена встречным броском липучки!");
                    } else {
                        hp -= 35; leak = true;
                        log("<b style='color:#ff3333;'>💥 БАБАХ! Наступил на мину! Тяжелые повреждения и утечка масла!</b>");
                    }
                } else if (obj.type === "enemy") {
                    if (inventory.mines > 0) {
                        inventory.mines--;
                        log("👾 Слепой мутант разорван направленным взрывом мины!");
                    } else {
                        hp -= 30;
                        log("⚔️ Ближний бой! Мутант ликвидирован ценой структуры корпуса (-30 HP).");
                    }
                }
                updateUI();
            }
        });
    }

    function drawExpie(x, y) {
        ctx.fillStyle = "#20252e";
        ctx.fillRect(x + 5, y + 40, 3, 15);
        ctx.fillRect(x + 15, y + 40, 3, 15);
        
        ctx.fillStyle = "#161a22";
        ctx.fillRect(x - 5, y + 25, 10, 12);
        
        ctx.fillStyle = "#2a313d";
        ctx.fillRect(x + 2, y + 15, 16, 26);
        
        ctx.fillRect(x + 4, y, 10, 16);
        
        ctx.fillStyle = "#ff99cc";
        ctx.shadowBlur = 12;
        ctx.shadowColor = "#ff3399";
        ctx.fillRect(x + 10, y + 4, 5, 5);
        
        ctx.shadowBlur = 0;
    }

    function gameLoop() {
        if (gameOver) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#0a0d12";
        ctx.fillRect(0, 0, canvas.width, 150);

        ctx.fillStyle = "#1c2128";
        ctx.fillRect(0, 150, canvas.width, 50);
        ctx.fillStyle = "#ff3366"; 
        ctx.fillRect(0, 150, canvas.width, 2); 

        if (keys["ArrowRight"] && player.x < maxDepth + 40) {
            player.x += player.speed;
            if (leak && Math.random() < 0.04) {
                hp -= 1;
                updateUI();
            }
            checkCollisions();
        }
        if (keys["ArrowLeft"] && player.x > 30) {
            player.x -= player.speed;
            if (leak && Math.random() < 0.04) {
                hp -= 1;
                updateUI();
            }
            checkCollisions();
        }

        depth = player.x; 
        updateUI();

        let offsetX = canvas.width / 2 - player.x;
        if (offsetX > 0) offsetX = 0;
        if (offsetX < canvas.width - (maxDepth + 100)) offsetX = canvas.width - (maxDepth + 100);

        ctx.font = "20px Courier New";
        gameObjects.forEach(obj => {
            if (obj.active) {
                ctx.fillText(obj.icon, obj.x + offsetX, player.y + 35);
                if(obj.type === "exit") {
                    ctx.fillStyle = "#00ff00"; 
                    ctx.fillRect(obj.x + offsetX + 5, player.y - 5, 15, 60);
                }
            }
        });

        ctx.fillStyle = "#ff3366";
        ctx.font = "12px Courier New";
        let left = Math.floor(maxDepth - player.x);
        if (left > 0) {
            ctx.fillText(`Лифт: Впереди в ${left}м →`, 310, 25);
        }

        drawExpie(player.x + offsetX, player.y);

        requestAnimationFrame(gameLoop);
    }

    function rechargeBattery() {
        if (inventory.titan >= 1) {
            inventory.titan--;
            hp = Math.min(100, hp + 30);
            leak = false;
            log("⚡ Корпус заварен титановыми пластинами. Утечка масла ликвидирована.");
            updateUI();
        } else {
            log("❌ Ошибка: Требуется 1 ед. Титана.");
        }
    }

    function craftMine() {
        if (inventory.gunpowder >= 1 && inventory.titan >= 1) {
            inventory.gunpowder--;
            inventory.titan--;
            inventory.mines++;
            log("🛠️ Собрана активная мина-липучка.");
            updateUI();
        } else {
            log("❌ Недостаточно компонентов.");
        }
    }

    updateUI();
    gameLoop();
</script>
</body>
</html>
