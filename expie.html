<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAV: Прототип Expie</title>
    <style>
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            font-family: monospace; 
            padding: 20px; 
            text-align: center; 
        }
        
        .back-btn {
            display: inline-block;
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #555;
            margin-bottom: 20px;
        }
        .back-btn:hover { background-color: #444; }

        .game-container { 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            gap: 40px; 
            margin-top: 20px; 
        }
        
        .character-viewport { 
            position: relative; 
            width: 300px; 
            height: 400px; 
            background: #1a1a1a; 
            border: 2px solid #333;
        }
        
        .body-part-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .character-status { 
            border: 2px solid #333; 
            padding: 20px; 
            background: #1a1a1a; 
            width: 320px; 
            text-align: left; 
        }
        
        .controls { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            width: 250px; 
        }
        
        button { 
            background: #cf1414; 
            color: white; 
            border: none; 
            padding: 10px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        
        button.heal { 
            background: #14cf43; 
        }
        
        button:hover { opacity: 0.8; }
        
        .status-ok { color: #14cf43; }
        .status-warn { color: #ff9900; }
        .status-crit { color: #cf1414; font-weight: bold; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ НА ГЛАВНУЮ СТРАНИЦУ</a>

    <h1>СИСТЕМА ЖИЗНЕОБЕСПЕЧЕНИЯ ЭКСПЕРИМЕНТА</h1>
    <h2 id="global-status" class="status-ok">ПОДОПЫТНЫЙ СТАБИЛЕН</h2>

    <div class="game-container">
        
        <!-- КУКЛА ПЕРСОНАЖА -->
        <div class="character-viewport">
            <img id="img-tail" class="body-part-layer" src="experimentTail.png" alt="Tail">
            <img id="img-thigh" class="body-part-layer" src="experimentThigh.png" alt="Thigh">
            <img id="img-crus" class="body-part-layer" src="experimentCrus.png" alt="Crus">
            <img id="img-foot" class="body-part-layer" src="experimentFoot.png" alt="Foot">
            <img id="img-downtorso" class="body-part-layer" src="experimentDownTorso.png" alt="DownTorso">
            <img id="img-uptorso" class="body-part-layer" src="experimentUpTorso.png" alt="UpTorso">
            <img id="img-uparm" class="body-part-layer" src="experimentUpArm.png" alt="UpArm">
            <img id="img-downarm" class="body-part-layer" src="experimentDownArm.png" alt="DownArm">
            <img id="img-handb" class="body-part-layer" src="experimentHandB.png" alt="HandB">
            <img id="img-handf" class="body-part-layer" src="experimentHandF.png" alt="HandF">
            <img id="img-head" class="body-part-layer" src="experimentHead.png" alt="Head">
            <img id="img-eye" class="body-part-layer" src="experimentEyeOpen.png" alt="Eye">
        </div>

        <!-- МОНИТОРИНГ ЗДОРОВЬЯ -->
        <div class="character-status">
            <h3>Мониторинг систем:</h3>
            <p>Голова: <span id="hp-head">100</span>/100</p>
            <p>Верхний Торс: <span id="hp-uptorso">120</span>/120</p>
            <p>Нижний Торс: <span id="hp-downtorso">100</span>/100</p>
            <p>Голень (Нога): <span id="hp-crus">60</span>/60 <span id="lbl-crus"></span></p>
            <p>Хвост: <span id="hp-tail">40</span>/40</p>
            <hr>
            <p>Кровотечение: <span id="bleed-status">НЕТ</span></p>
            <p>Состояние Чипа: <span id="sanity-status">СТАБИЛЬНО</span></p>
        </div>

        <!-- КНОПКИ ДЛЯ СИМУЛЯЦИИ -->
        <div class="controls">
            <h3>Симуляция атак мутантов:</h3>
            <button onclick="dealDamage('head', 35)">Удар лапой в лицо (-35 HP)</button>
            <button onclick="dealDamage('head', 40)">Критический укус в голову (-40 HP)</button>
            <button onclick="dealDamage('crus', 45)">Попадание в голень (-45 HP)</button>
            <button onclick="dealDamage('tail', 40)">Откусить хвост (-40 HP)</button>
            <hr>
            <h3>Медицинские протоколы:</h3>
            <button class="heal" onclick="heal('head', 100)">Применить Хирургический Набор</button>
            <button class="heal" onclick="heal('crus', 60)">Наложить медицинскую шину</button>
        </div>
    </div>

    <!-- ПОДКЛЮЧАЕМ СКРИПТ ЛОГИКИ -->
    <script src="game.js"></script>
</body>
</html>
