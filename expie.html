<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAV: Прототип Expie</title>
    <style>
        body { background: #0b0c10; color: #c5c6c7; font-family: monospace; padding: 20px; text-align: center; }
        .back-btn { display: inline-block; background: #1f2833; color: #66fcf1; padding: 10px 20px; text-decoration: none; border: 1px solid #45f3ff; border-radius: 4px; margin-bottom: 20px; }
        .game-container { display: flex; justify-content: center; gap: 30px; margin-top: 20px; flex-wrap: wrap; }
        .character-viewport { position: relative; width: 320px; height: 480px; background: #1f2833; border: 2px solid #45f3ff; border-radius: 8px; overflow: hidden; }
        .character-viewport img { position: absolute; object-fit: contain; image-rendering: pixelated; transform: none; }
        .character-status { border: 2px solid #1f2833; padding: 20px; background: #141a22; width: 300px; text-align: left; border-radius: 8px; }
        
        /* Стили для ползунков */
        .slider-panel { margin-top: 15px; padding: 10px; background: #141a22; border: 1px dashed #66fcf1; border-radius: 4px; }
        .slider-group { margin: 10px 0; text-align: left; }
        .slider-group label { display: inline-block; width: 80px; color: #66fcf1; font-weight: bold; }
        .slider-group input { width: 180px; vertical-align: middle; }
        .slider-value { color: #fff; margin-left: 5px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">⬅ НА ГЛАВНУЮ</a>
    <h1>СИСТЕМА ЖИЗНЕОБЕСПЕЧЕНИЯ ЭКСПЕРИМЕНТА</h1>
    
    <div class="game-container">
        <!-- КУКЛА ПЕРСОНАЖА -->
        <div class="character-viewport">
            <img id="img-tail" src="experimentTail.png" style="top:180px;left:20px;width:160px;height:160px;z-index:1;">
            <img id="img-thigh" src="experimentThigh.png" style="top:260px;left:110px;width:105px;height:95px;z-index:3;">
            <img id="img-crus" src="experimentCrus.png" style="top:310px;left:95px;width:110px;height:100px;z-index:2;">
            <img id="img-foot" src="experimentFoot.png" style="top:375px;left:115px;width:100px;height:75px;z-index:3;">
            <img id="img-downtorso" src="experimentDownTorso.png" style="top:215px;left:115px;width:105px;height:95px;z-index:4;">
            <img id="img-uptorso" src="experimentUpTorso.png" style="top:145px;left:110px;width:115px;height:115px;z-index:5;">
            <img id="img-uparm" src="experimentUpArm.png" style="top:165px;left:115px;width:110px;height:85px;z-index:4;">
            <img id="img-downarm" src="experimentDownArm.png" style="top:200px;left:125px;width:105px;height:80px;z-index:6;">
            <img id="img-handb" src="experimentHandB.png" style="top:240px;left:100px;width:55px;height:55px;z-index:3;">
            <img id="img-handf" src="experimentHandF.png" style="top:235px;left:160px;width:55px;height:55px;z-index:7;">
            <img id="img-head" src="experimentHead.png" style="top:15px;left:88px;width:175px;height:175px;z-index:10;">
            <!-- ГЛАЗ (Управляется ползунками) -->
            <img id="img-eye" src="experimentEyeOpen.png" style="z-index:11;">
        </div>

        <!-- ПАНЕЛЬ УПРАВЛЕНИЯ ПОЛЗУНКАМИ -->
        <div class="character-status">
            <h3>Мониторинг и настройка:</h3>
            
            <div class="slider-panel">
                <h4 style="margin:0 0 10px 0; color:#66fcf1; text-align:center;">НАСТРОЙКА ГЛАЗА (1%-100%):</h4>
                
                <div class="slider-group">
                    <label>Ось X:</label>
                    <input type="range" id="slide-x" min="1" max="100" value="51" oninput="moveEye()">
                    <span id="val-x" class="slider-value">51%</span>
                </div>
                
                <div class="slider-group">
                    <label>Ось Y:</label>
                    <input type="range" id="slide-y" min="1" max="100" value="11" oninput="moveEye()">
                    <span id="val-y" class="slider-value">11%</span>
                </div>
                
                <div class="slider-group">
                    <label>Размер:</label>
                    <input type="range" id="slide-size" min="1" max="100" value="15" oninput="moveEye()">
                    <span id="val-size" class="slider-value">15%</span>
                </div>
            </div>
            
            <p style="font-size:11px; margin-top:15px; color:#888; text-align:center;">Выровняй глаз ползунками и пришли получившиеся проценты!</p>
        </div>
    </div>

    <script>
        function moveEye() {
            // Читаем проценты из ползунков
            let pctX = document.getElementById("slide-x").value;
            let pctY = document.getElementById("slide-y").value;
            let pctSize = document.getElementById("slide-size").value;

            // Обновляем текст процентов на экране
            document.getElementById("val-x").innerText = pctX + "%";
            document.getElementById("val-y").innerText = pctY + "%";
            document.getElementById("val-size").innerText = pctSize + "%";

            // Переводим проценты в пиксели относительно окна 320x480
            let targetLeft = (pctX / 100) * 320;
            let targetTop = (pctY / 100) * 480;
            let targetSize = (pctSize / 100) * 320; // масштаб от ширины контейнера

            // Применяем позицию к глазу
            let eye = document.getElementById("img-eye");
            eye.style.left = targetLeft + "px";
            eye.style.top = targetTop + "px";
            eye.style.width = targetSize + "px";
            eye.style.height = targetSize + "px";
        }

        // Запуск выравнивания при старте страницы
        moveEye();
    </script>
</body>
</html>
