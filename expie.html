<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAV: CASUALTIES UNKNOWN (RAGDOLL TRIGGER)</title>
    <style>
        body {
            background-color: #080a0c;
            color: #d1d7de;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        .game-container {
            width: 560px;
            background-color: #12161c;
            border: 2px solid #3a4454;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            position: relative;
        }
        h1 { text-align: center; color: #ff3366; font-size: 18px; margin-top: 0; letter-spacing: 3px; }
        
        .back-to-menu {
            position: absolute;
            top: 15px;
            left: 20px;
            background: #181d26;
            color: #8b949e;
            border: 1px solid #222933;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
        }
        .back-to-menu:hover { border-color: #ff3366; color: #fff; }

        #gameCanvas {
            background-color: #040507;
            border: 2px solid #222933;
            display: block;
            margin: 0 auto 15px auto;
            border-radius: 4px;
        }

        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; background: #181d26; padding: 10px; border-radius: 4px; border: 1px solid #222933; font-size: 14px; }
        .log { height: 75px; background-color: #090b0e; border: 1px solid #222933; padding: 10px; overflow-y: auto; font-size: 13px; margin-bottom: 15px; border-radius: 4px; color: #8b949e; }
    </style>
</head>
<body>

<div class="game-container">
    <a href="index.html" class="back-to-menu">← НА ГЛАВНУЮ</a>
    <h1>SCAV: CASUALTIES UNKNOWN</h1>
    
    <canvas id="gameCanvas" width="500" height="240"></canvas>

    <div class="stats">
        <div>Режим скафандра: <span id="mode-text" style="color: #00ff00; font-weight: bold;">ХОДЬБА</span></div>
        <div>Кнопка <b>[ X ]</b>: Падение / Встать</div>
    </div>
    
    <div id="log" class="log">> Системы стабилизированы. Стрелочки — ходить, [ X ] — упасть!</div>
</div>
<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const logEl = document.getElementById('log');
    function log(text) {
        logEl.innerHTML += `<br>${text}`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    // Загрузка спрайтов
    const sprites = {
        head: new Image(), eyeOpen: new Image(), upTorso: new Image(),
        downTorso: new Image(), tail: new Image(), thigh: new Image(),
        crus: new Image(), foot: new Image(), upArm: new Image(),
        downArm: new Image(), handB: new Image(), handF: new Image()
    };

    sprites.head.src = "experimentHead.png";
    sprites.eyeOpen.src = "experimentEyeOpen.png";
    sprites.upTorso.src = "experimentUpTorso.png";
    sprites.downTorso.src = "experimentDownTorso.png";
    sprites.tail.src = "experimentTail.png";
    sprites.thigh.src = "experimentThigh.png";
    sprites.crus.src = "experimentCrus.png";
    sprites.foot.src = "experimentFoot.png";
    sprites.upArm.src = "experimentUpArm.png";
    sprites.downArm.src = "experimentDownArm.png";
    sprites.handB.src = "experimentHandB.png";
    sprites.handF.src = "experimentHandF.png";

    let player = {
        x: 220,
        y: 40,
        speed: 3,
        direction: "right",
        isRagdoll: false
    };

    let points = [
        { x: 250, y: 40, oldX: 250, oldY: 40 },       
        { x: 250, y: 65, oldX: 250, oldY: 65 },       
        { x: 250, y: 90, oldX: 250, oldY: 90 },       
        { x: 232, y: 98, oldX: 232, oldY: 98 },       
        { x: 246, y: 104, oldX: 246, oldY: 104 },     
        { x: 246, y: 118, oldX: 246, oldY: 118 },     
        { x: 242, y: 130, oldX: 242, oldY: 130 },     
        { x: 254, y: 104, oldX: 254, oldY: 104 },     
        { x: 254, y: 118, oldX: 254, oldY: 118 },     
        { x: 258, y: 130, oldX: 258, oldY: 130 },     
        { x: 238, y: 76, oldX: 238, oldY: 76 },       
        { x: 262, y: 76, oldX: 262, oldY: 76 }        
    ];

    let constraints = [
        { p1: 0, p2: 1, length: 22 },  
        { p1: 1, p2: 2, length: 20 },  
        { p1: 2, p2: 3, length: 16 },  
        { p1: 2, p2: 4, length: 14 },  
        { p1: 4, p2: 5, length: 14 },  
        { p1: 5, p2: 6, length: 10 },  
        { p1: 2, p2: 7, length: 14 },  
        { p1: 7, p2: 8, length: 14 },  
        { p1: 8, p2: 9, length: 10 },  
        { p1: 1, p2: 10, length: 14 }, 
        { p1: 1, p2: 11, length: 14 }  
    ];

    const gravity = 0.35;
    const bounce = 0.3;
    let keys = {};
    let animTime = 0;
</script>
<script>
    window.addEventListener("keydown", (e) => { 
        keys[e.key] = true; 
        
        // Переключение режимов по кнопке X (английской) или Ч (русской)
        if (e.key.toLowerCase() === "x" || e.key.toLowerCase() === "ч") {
            player.isRagdoll = !player.isRagdoll;
            
            if (player.isRagdoll) {
                document.getElementById("mode-text").innerText = "РЭГДОЛЛ";
                document.getElementById("mode-text").style.color = "#ff3366";
                log("⚠️ Мышцы отключены! Скафандр Expie рухнул на пол.");
                
                // Переносим текущие координаты из режима ходьбы в точки физики
                points[0].x = player.x + 22; points[0].y = player.y + 18; // Голова
                points[1].x = player.x + 20; points[1].y = player.y + 36; // Грудь
                points[2].x = player.x + 16; points[2].y = player.y + 58; // Таз
                points.forEach(p => { p.oldX = p.x; p.oldY = p.y; });
            } else {
                document.getElementById("mode-text").innerText = "ХОДЬБА";
                document.getElementById("mode-text").style.color = "#00ff00";
                log("✅ Моторика восстановлена! Expie поднялся на лапы.");
                
                // Возвращаем персонажа в режим ходьбы туда, где упал таз
                player.x = points[2].x - 16;
                player.y = Math.min(points[2].y - 58, 60);
            }
        }
    });
    window.addEventListener("keyup", (e) => { keys[e.key] = false; });

    function drawWalkingExpie(x, y) {
        let legSwing = Math.sin(animTime * 0.15) * 6;
        let armSwing = Math.cos(animTime * 0.15) * 4;

        if (!keys["ArrowRight"] && !keys["ArrowLeft"]) {
            legSwing = 0; armSwing = 0;
        }

        ctx.save();
        if (player.direction === "left") {
            ctx.translate(x + 25, y); ctx.scale(-1, 1); ctx.translate(-x - 25, -y);
        }

        let sitY = y + 42; 

        if (sprites.tail.complete) ctx.drawImage(sprites.tail, x + 2, sitY + 12, 24, 24);
        if (sprites.upArm.complete && sprites.handB.complete) {
            ctx.drawImage(sprites.upArm, x + 14 - armSwing * 0.2, sitY - 4, 16, 12);
            ctx.drawImage(sprites.handB, x + 24 - armSwing * 0.4, sitY, 10, 10);
        }
        if (sprites.thigh.complete && sprites.crus.complete && sprites.foot.complete) {
            let backLegOffset = legSwing;
            ctx.drawImage(sprites.thigh, x + 4 + backLegOffset * 0.2, sitY + 10, 16, 12);
            ctx.drawImage(sprites.crus, x + 10 + backLegOffset * 0.4, sitY + 16, 12, 14);
            ctx.drawImage(sprites.foot, x + 12 + backLegOffset, sitY + 26, 14, 8);
        }
        if (sprites.downTorso.complete) ctx.drawImage(sprites.downTorso, x + 4, sitY + 6, 26, 14);
        if (sprites.upTorso.complete) ctx.drawImage(sprites.upTorso, x + 8, sitY - 6, 26, 16);

        ctx.fillStyle = "#1e222a"; ctx.fillRect(x + 18, sitY - 10, 6, 3); 

        if (sprites.head.complete) ctx.drawImage(sprites.head, x + 10, sitY - 24, 24, 16);
        if (sprites.eyeOpen.complete) {
            ctx.shadowBlur = 10; ctx.shadowColor = "#ff3399";
            ctx.drawImage(sprites.eyeOpen, x + 22, sitY - 18, 6, 6);
            ctx.shadowBlur = 0;
        }
        if (sprites.thigh.complete && sprites.crus.complete && sprites.foot.complete) {
            let frontLegOffset = -legSwing;
            ctx.drawImage(sprites.thigh, x + 8 + frontLegOffset * 0.2, sitY + 10, 16, 12);
            ctx.drawImage(sprites.crus, x + 14 + frontLegOffset * 0.4, sitY + 16, 12, 14);
            ctx.drawImage(sprites.foot, x + 18 + frontLegOffset, sitY + 26, 14, 8);
        }
        if (sprites.downArm.complete && sprites.handF.complete) {
            ctx.drawImage(sprites.downArm, x + 18 + armSwing * 0.2, sitY - 4, 16, 12);
            ctx.drawImage(sprites.handF, x + 30 + armSwing * 0.4, sitY, 10, 10);
        }
        ctx.restore();
    }

    function updatePhysics() {
        points.forEach(p => {
            let vx = p.x - p.oldX;
            let vy = p.y - p.oldY;
            p.oldX = p.x; p.oldY = p.y;
            p.x += vx; p.y += vy + gravity;

            // Пол шахты на 160px
            if (p.y > 160) { p.y = 160; p.oldY = p.y + vy * bounce; }
            if (p.x > canvas.width) { p.x = canvas.width; p.oldX = p.x + vx * bounce; }
            if (p.x < 0) { p.x = 0; p.oldX = p.x + vx * bounce; }
        });

        for (let i = 0; i < 10; i++) {
            constraints.forEach(c => {
                let p1 = points[c.p1]; let p2 = points[c.p2];
                let dx = p2.x - p1.x; let dy = p2.y - p1.y;
                let dist = Math.hypot(dx, dy);
                if (dist === 0) dist = 1;
                let diff = c.length - dist;
                let percent = diff / dist / 2;
                let offsetX = dx * percent; let offsetY = dy * percent;
                p1.x -= offsetX; p1.y -= offsetY;
                p2.x += offsetX; p2.y += offsetY;
            });
        }
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0a0d12"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#2c3540"; ctx.fillRect(0, 168, canvas.width, 72);

        if (!player.isRagdoll) {
            if (keys["ArrowRight"] && player.x < canvas.width - 50) {
                player.x += player.speed; player.direction = "right"; animTime++;
            }
            if (keys["ArrowLeft"] && player.x > 10) {
                player.x -= player.speed; player.direction = "left"; animTime++;
            }
            drawWalkingExpie(player.x, player.y);
        } else {
            updatePhysics();
            if (sprites.tail.complete) ctx.drawImage(sprites.tail, points[3].x - 12, points[3].y - 12, 24, 24);
            if (sprites.upArm.complete && sprites.handB.complete) {
                ctx.drawImage(sprites.upArm, points[10].x - 6, points[10].y - 6, 12, 14);
                ctx.drawImage(sprites.handB, points[10].x - 5, points[10].y + 6, 10, 10);
            }
            if (sprites.thigh.complete && sprites.crus.complete && sprites.foot.complete) {
                ctx.drawImage(sprites.thigh, points[4].x - 6, points[4].y - 6, 12, 14);
                ctx.drawImage(sprites.crus, points[5].x - 5, points[5].y - 6, 10, 14);
                ctx.drawImage(sprites.foot, points[6].x - 6, points[6].y - 4, 12, 6);
            }
            if (sprites.downTorso.complete) ctx.drawImage(sprites.downTorso, points[2].x - 12, points[2].y - 7, 24, 14);
            if (sprites.upTorso.complete) ctx.drawImage(sprites.upTorso, points[1].x - 12, points[1].y - 8, 24, 16);
            
            ctx.fillStyle = "#1e222a"; ctx.fillRect((points[0].x + points[1].x)/2 - 2, (points[0].y + points[1].y)/2 - 1, 4, 3);
            
            if (sprites.head.complete) ctx.drawImage(sprites.head, points[0].x - 12, points[0].y - 8, 24, 16);
            if (sprites.eyeOpen.complete) {
                ctx.shadowBlur = 10; ctx.shadowColor = "#ff3399";
                ctx.drawImage(sprites.eyeOpen, points[0].x + 2, points[0].y - 3, 6, 6);
                ctx.shadowBlur = 0;
            }
            if (sprites.thigh.complete && sprites.crus.complete && sprites.foot.complete) {
                ctx.drawImage(sprites.thigh, points[7].x - 6, points[7].y - 6, 12, 14);
                ctx.drawImage(sprites.crus, points[8].x - 5, points[8].y - 6, 10, 14);
                ctx.drawImage(sprites.foot, points[9].x - 6, points[9].y - 4, 12, 6);
            }
            if (sprites.downArm.complete && sprites.handF.complete) {
                ctx.drawImage(sprites.downArm, points[11].x - 6, points[11].y - 6, 12, 14);
                ctx.drawImage(sprites.handF, points[11].x - 5, points[11].y + 6, 10, 10);
            }
        }

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
