<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAV: CASUALTIES UNKNOWN 2D</title>
    <style>
        body {
            background-color: #080a0c;
            color: #d1d7de;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        .game-container {
            width: 560px;
            background-color: #12161c;
            border: 2px solid #3a4454;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
        }
        h1 { text-align: center; color: #ff3366; font-size: 18px; margin-top: 0; letter-spacing: 3px; }
        
        #gameCanvas {
            background-color: #040507;
            border: 2px solid #222933;
            display: block;
            margin: 0 auto 15px auto;
            border-radius: 4px;
        }

        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; background: #181d26; padding: 10px; border-radius: 4px; border: 1px solid #222933; font-size: 14px; }
        .log { height: 75px; background-color: #090b0e; border: 1px solid #222933; padding: 10px; overflow-y: auto; font-size: 13px; margin-bottom: 15px; border-radius: 4px; color: #8b949e; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>SCAV: CASUALTIES UNKNOWN (2D)</h1>
    
    <canvas id="gameCanvas" width="500" height="240"></canvas>

    <div class="stats">
        <div>Статус: <span id="status">Инициализация...</span></div>
        <div>Управление: <b>← → и Пробел</b></div>
    </div>
    
    <div id="log" class="log">Загрузка текстуры Expie...</div>
</div>
<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Прямая ссылка на картинку Expie со всеми правами
    const expieImg = new Image();
    expieImg.src = "https://squarespace-cdn.com"; 

    let gameOver = false;
    let isJumping = false;
    let yVelocity = 0;
    const gravity = 0.5;

    // Параметры Expie
    let player = {
        x: 50,
        y: 120,
        width: 35,
        height: 70,
        speed: 4
    };

    const logEl = document.getElementById('log');
    function log(text) {
        logEl.innerHTML += `<br>${text}`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    expieImg.onload = function() {
        document.getElementById('status').innerText = "Готов к тесту";
        log("✅ Текстура Expie успешно загружена! Стрелочки — ходить, Пробел — прыгать.");
    };

    expieImg.onerror = function() {
        document.getElementById('status').innerText = "Ошибка текстуры";
        log("❌ Не удалось загрузить картинку. Проверьте подключение к сети.");
    };

    let keys = {};
    window.addEventListener("keydown", (e) => { keys[e.key] = true; });
    window.addEventListener("keyup", (e) => { keys[e.key] = false; });

    function gameLoop() {
        if (gameOver) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Рисуем временный пол, пока нет блоков карты
        ctx.fillStyle = "#1c2128";
        ctx.fillRect(0, 190, canvas.width, 50);

        // Физика ходьбы влево и вправо
        if (keys["ArrowRight"] && player.x < canvas.width - player.width) {
            player.x += player.speed;
        }
        if (keys["ArrowLeft"] && player.x > 10) {
            player.x -= player.speed;
        }

        // Физика прыжка с гравитацией
        if (keys[" "] && !isJumping) {
            isJumping = true;
            yVelocity = -9; // Сила прыжка вверх
        }

        if (isJumping) {
            player.y += yVelocity;
            yVelocity += gravity; // Тянем персонажа обратно вниз

            // Проверяем приземление на временный пол
            if (player.y >= 120) {
                player.y = 120;
                isJumping = false;
                yVelocity = 0;
            }
        }

        // Отрисовка Expie с картинки
        if (expieImg.complete && expieImg.naturalWidth !== 0) {
            ctx.drawImage(expieImg, player.x, player.y, player.width, player.height);
        } else {
            // Резервный силуэт, если интернет зависнет
            ctx.fillStyle = "#ff3366";
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
